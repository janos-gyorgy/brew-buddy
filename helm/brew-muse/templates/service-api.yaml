apiVersion: v1
kind: Service
metadata:
  name: {{ include "brew-muse.fullname" . }}-api
  labels:
    {{- include "brew-muse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "brew-muse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
