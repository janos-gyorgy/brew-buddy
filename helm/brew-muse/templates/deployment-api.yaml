apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brew-muse.fullname" . }}-api
  labels:
    {{- include "brew-muse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "brew-muse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "brew-muse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              {{- if .Values.api.env.DATABASE_URL }}
              value: {{ .Values.api.env.DATABASE_URL | quote }}
              {{- else if .Values.postgres.enabled }}
              value: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.username .Values.postgres.password (include "brew-muse.fullname" .) .Values.postgres.database | quote }}
              {{- else }}
              value: ""
              {{- end }}
            - name: PORT
              value: {{ .Values.api.env.PORT | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
