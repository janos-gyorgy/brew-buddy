replicaCount: 1

image:
  repository: brew-muse
  tag: latest
  pullPolicy: IfNotPresent

api:
  image:
    repository: brew-muse-api
    tag: latest
    pullPolicy: IfNotPresent
  env:
    # DATABASE_URL is constructed from postgres.* values at deploy time.
    # Override this if using an external database.
    DATABASE_URL: ""
    PORT: "3000"
    # Marks cookies Secure and requires SESSION_SECRET to be set.
    NODE_ENV: "production"
    # Required in production — secret used to sign session cookies (JWT).
    # Set via --set api.env.SESSION_SECRET=<random-string> or a values override.
    SESSION_SECRET: ""
    # Required for self-serve registration — the shared invite code new users
    # must enter to create an account. Leave empty to disable registration.
    INVITE_CODE: ""
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Environment variables for the nginx frontend container
env:
  API_BACKEND_URL: "http://brew-muse-api:3000"

postgres:
  enabled: true
  image: postgres:16-alpine
  database: brewbuddy
  username: brewbuddy
  # Required — set via --set postgres.password=<your-password> or a values override
  password: ""
  storage: 5Gi

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: brew-muse.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
