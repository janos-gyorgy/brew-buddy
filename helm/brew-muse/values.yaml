replicaCount: 1

image:
  repository: brew-muse
  tag: latest
  pullPolicy: IfNotPresent

api:
  image:
    repository: brew-muse-api
    tag: latest
    pullPolicy: IfNotPresent
  env:
    DATABASE_URL: "postgresql://brewbuddy:changeme@brew-muse-postgres:5432/brewbuddy"
    PORT: "3000"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Environment variables for the nginx frontend container
env:
  API_BACKEND_URL: "http://brew-muse-api:3000"

postgres:
  enabled: true
  image: postgres:16-alpine
  database: brewbuddy
  username: brewbuddy
  # Set this via --set postgres.password=... or a Secret
  password: changeme
  storage: 5Gi

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: brew-muse.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}
